<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastOJ</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="app-header">
        <nav class="topbar">
            <button class="brand" type="button" onclick="showSection('problems')">FastOJ</button>
            <div class="topbar-actions">
                <button class="nav-button" type="button" onclick="showSection('problems')">题库</button>
                <button class="nav-button auth-only" type="button" onclick="showSection('status')">提交记录</button>
                <button class="nav-button guest-only" type="button" onclick="showSection('login')">登录</button>
                <button class="nav-button guest-only" type="button" onclick="showSection('register')">注册</button>
                <button class="nav-button auth-only" type="button" onclick="logout()">退出</button>
            </div>
        </nav>
    </header>

    <main class="shell">
        <section id="section-problems" class="section active">
            <div class="page-heading">
                <div>
                    <h1>题库</h1>
                    <p>按难度、标签和关键词筛选题目，进入工作台后可运行公开用例或提交完整评测。</p>
                </div>
                <div class="user-chip" id="current-user"></div>
            </div>

            <form class="filters" onsubmit="applyProblemFilters(event)">
                <input id="filter-keyword" type="search" placeholder="搜索题目">
                <select id="filter-difficulty" aria-label="难度">
                    <option value="">全部难度</option>
                    <option value="easy">简单</option>
                    <option value="medium">中等</option>
                    <option value="hard">困难</option>
                </select>
                <input id="filter-tags" type="search" placeholder="标签，多个用逗号分隔">
                <button class="button primary" type="submit">筛选</button>
                <button class="button ghost" type="button" onclick="resetProblemFilters()">重置</button>
            </form>

            <div id="problems-list" class="problem-list"></div>
            <div class="pagination">
                <button class="button ghost" type="button" onclick="changeProblemPage(-1)">上一页</button>
                <span id="page-indicator">第 1 页</span>
                <button class="button ghost" type="button" onclick="changeProblemPage(1)">下一页</button>
            </div>
        </section>

        <section id="section-workspace" class="section">
            <div class="workspace-toolbar">
                <button class="button ghost" type="button" onclick="showSection('problems')">返回题库</button>
                <div id="workspace-title" class="workspace-title"></div>
            </div>

            <div class="workspace">
                <article class="problem-pane">
                    <div id="problem-detail-content"></div>
                </article>

                <aside class="editor-pane">
                    <div class="editor-toolbar">
                        <select id="language-select" class="language-select" onchange="changeLanguage()">
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <option value="typescript">TypeScript</option>
                            <option value="c">C</option>
                            <option value="cpp">C++</option>
                            <option value="java">Java</option>
                            <option value="golang">Go</option>
                        </select>
                        <div class="run-actions">
                            <button class="button" type="button" onclick="runCode()">运行</button>
                            <button class="button primary" type="button" onclick="submitCode()">提交</button>
                        </div>
                    </div>
                    <div id="monaco-editor" class="monaco-editor"></div>
                    <textarea id="code-input" class="code-editor" spellcheck="false"></textarea>
                    <section class="terminal">
                        <div class="terminal-header">
                            <span>评测输出</span>
                            <button class="icon-button" type="button" title="清空输出" onclick="clearTerminal()">清空</button>
                        </div>
                        <div id="terminal-output" class="terminal-output">请选择题目并运行代码。</div>
                    </section>
                </aside>
            </div>
        </section>

        <section id="section-login" class="section">
            <form class="auth-form" onsubmit="login(event)">
                <h1>登录</h1>
                <label>用户名<input id="login-username" type="text" autocomplete="username" required></label>
                <label>密码<input id="login-password" type="password" autocomplete="current-password" required></label>
                <button class="button primary full" type="submit">登录</button>
                <button class="link-button" type="button" onclick="showSection('register')">创建账号</button>
            </form>
        </section>

        <section id="section-register" class="section">
            <form class="auth-form" onsubmit="register(event)">
                <h1>注册</h1>
                <label>用户名<input id="register-username" type="text" autocomplete="username" required></label>
                <label>邮箱<input id="register-email" type="email" autocomplete="email" required></label>
                <label>密码<input id="register-password" type="password" autocomplete="new-password" required></label>
                <button class="button primary full" type="submit">注册</button>
                <button class="link-button" type="button" onclick="showSection('login')">已有账号，去登录</button>
            </form>
        </section>

        <section id="section-status" class="section">
            <div class="workspace-toolbar">
                <button class="button ghost" type="button" onclick="showSection('problems')">返回题库</button>
                <h1>提交记录</h1>
            </div>
            <div id="submissions-list" class="submission-list"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
