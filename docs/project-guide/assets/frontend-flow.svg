<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Frontend state and data flow</title>
  <desc id="desc">App chooses views, Workspace owns code and submission state, API client talks to FastAPI, WebSocket and polling update judge status, AI panel uses current submission.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 12; }
      .app { fill: #eff6ff; stroke: #2563eb; }
      .work { fill: #f0fdf4; stroke: #16a34a; }
      .state { fill: #fff7ed; stroke: #ea580c; }
      .ai { fill: #faf5ff; stroke: #9333ea; }
      .title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .small { font: 13px Arial, "Microsoft YaHei", sans-serif; fill: #374151; }
      .arrow { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #9333ea; stroke-width: 2.4; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="700"/>
  <text x="50" y="54" class="title">前端状态和数据流</text>

  <rect x="430" y="90" width="240" height="105" class="box app"/>
  <text x="505" y="128" class="label">App</text>
  <text x="465" y="156" class="small">view / locale / theme</text>
  <text x="465" y="180" class="small">selected problem / auth</text>

  <rect x="70" y="265" width="150" height="90" class="box app"/>
  <text x="106" y="302" class="label">Library</text>
  <text x="98" y="330" class="small">search / filters</text>

  <rect x="260" y="265" width="150" height="90" class="box app"/>
  <text x="305" y="302" class="label">Graph</text>
  <text x="292" y="330" class="small">tag navigation</text>

  <rect x="460" y="245" width="180" height="130" class="box work"/>
  <text x="505" y="282" class="label">Workspace</text>
  <text x="490" y="310" class="small">code / language</text>
  <text x="490" y="334" class="small">judge mode / cases</text>
  <text x="490" y="358" class="small">submission / events</text>

  <rect x="705" y="265" width="150" height="90" class="box app"/>
  <text x="746" y="302" class="label">Admin</text>
  <text x="735" y="330" class="small">drafts / cases</text>

  <rect x="890" y="265" width="150" height="90" class="box app"/>
  <text x="930" y="302" class="label">Auth/Settings</text>
  <text x="923" y="330" class="small">user profile</text>

  <rect x="100" y="480" width="190" height="100" class="box state"/>
  <text x="142" y="518" class="label">API Client</text>
  <text x="130" y="546" class="small">fetch + JWT</text>
  <text x="130" y="570" class="small">Zod response parse</text>

  <rect x="370" y="480" width="170" height="100" class="box state"/>
  <text x="405" y="518" class="label">WebSocket</text>
  <text x="405" y="546" class="small">judge events</text>
  <text x="405" y="570" class="small">real-time status</text>

  <rect x="610" y="480" width="170" height="100" class="box state"/>
  <text x="653" y="518" class="label">Polling</text>
  <text x="646" y="546" class="small">final detail</text>
  <text x="646" y="570" class="small">fallback state</text>

  <rect x="850" y="480" width="170" height="100" class="box ai"/>
  <text x="892" y="518" class="label">AI Panel</text>
  <text x="882" y="546" class="small">explain/review</text>
  <text x="882" y="570" class="small">hint/chat</text>

  <path class="arrow" d="M500 195 L160 265"/>
  <path class="arrow" d="M520 195 L350 265"/>
  <path class="arrow" d="M550 195 V245"/>
  <path class="arrow" d="M600 195 L760 265"/>
  <path class="arrow" d="M625 195 L950 265"/>
  <path class="arrow" d="M460 350 C350 410, 265 450, 220 480"/>
  <path class="arrow" d="M500 375 C485 420, 470 450, 455 480"/>
  <path class="arrow" d="M565 375 C610 420, 650 450, 690 480"/>
  <path class="dash" d="M640 350 C740 420, 845 450, 925 480"/>
  <text x="740" y="430" class="small">current submission only</text>
</svg>
