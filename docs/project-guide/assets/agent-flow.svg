<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">Problem authoring agent flow</title>
  <desc id="desc">Admin creates a problem draft, AI returns structured JSON, validator runs official solutions through sandbox, failed validation may trigger sanitized repair, and approved drafts create formal problems.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 12; }
      .admin { fill: #eff6ff; stroke: #2563eb; }
      .agent { fill: #faf5ff; stroke: #9333ea; }
      .judge { fill: #fff7ed; stroke: #ea580c; }
      .db { fill: #f0fdf4; stroke: #16a34a; }
      .title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .small { font: 13px Arial, "Microsoft YaHei", sans-serif; fill: #374151; }
      .arrow { stroke: #7c3aed; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #dc2626; stroke-width: 2.3; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="640"/>
  <text x="50" y="54" class="title">管理员出题 Agent：生成、校验、修复、发布</text>

  <rect x="55" y="140" width="150" height="100" class="box admin"/>
  <text x="92" y="178" class="label">Admin UI</text>
  <text x="82" y="206" class="small">topic / mode</text>
  <text x="82" y="228" class="small">target languages</text>

  <rect x="260" y="140" width="155" height="100" class="box admin"/>
  <text x="288" y="178" class="label">Admin API</text>
  <text x="288" y="206" class="small">require_admin</text>
  <text x="288" y="228" class="small">create draft</text>

  <rect x="470" y="140" width="180" height="100" class="box agent"/>
  <text x="500" y="178" class="label">AuthoringAgent</text>
  <text x="502" y="206" class="small">AgentRun / steps</text>
  <text x="502" y="228" class="small">repair loop</text>

  <rect x="720" y="115" width="170" height="95" class="box agent"/>
  <text x="758" y="152" class="label">AI Provider</text>
  <text x="750" y="180" class="small">structured JSON</text>

  <rect x="720" y="280" width="170" height="105" class="box judge"/>
  <text x="748" y="318" class="label">Validator</text>
  <text x="746" y="346" class="small">schema + fields</text>
  <text x="746" y="370" class="small">run solutions</text>

  <rect x="470" y="285" width="180" height="100" class="box judge"/>
  <text x="512" y="322" class="label">Docker Sandbox</text>
  <text x="502" y="350" class="small">official solution</text>
  <text x="502" y="372" class="small">against cases</text>

  <rect x="260" y="430" width="190" height="110" class="box db"/>
  <text x="298" y="468" class="label">ProblemDraft</text>
  <text x="292" y="496" class="small">validation_report</text>
  <text x="292" y="520" class="small">status validated/failed</text>

  <rect x="620" y="430" width="200" height="110" class="box db"/>
  <text x="656" y="468" class="label">Approve</text>
  <text x="650" y="496" class="small">Problem + TestCase</text>
  <text x="650" y="520" class="small">Solution rows</text>

  <path class="arrow" d="M205 190 H260"/>
  <path class="arrow" d="M415 190 H470"/>
  <path class="arrow" d="M650 175 H720"/>
  <path class="arrow" d="M805 210 V280"/>
  <path class="arrow" d="M720 335 H650"/>
  <path class="arrow" d="M560 385 C520 430, 480 470, 450 485"/>
  <path class="arrow" d="M450 485 H620"/>
  <path class="loop" d="M720 330 C635 270, 690 150, 720 150"/>
  <text x="646" y="250" class="small">sanitized repair context</text>
</svg>
