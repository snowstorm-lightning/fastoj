<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">FastOJ runtime architecture</title>
  <desc id="desc">React frontend calls FastAPI. FastAPI uses PostgreSQL, Redis Streams, WebSocket relay, worker, Docker judge runtime, and AI provider.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; }
      .soft { fill: #eff6ff; stroke: #2563eb; }
      .data { fill: #f0fdf4; stroke: #16a34a; }
      .worker { fill: #fff7ed; stroke: #ea580c; }
      .ai { fill: #faf5ff; stroke: #9333ea; }
      .title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .label { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .small { font: 14px Arial, "Microsoft YaHei", sans-serif; fill: #374151; }
      .arrow { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text x="60" y="54" class="title">FastOJ 总体运行架构</text>
  <text x="60" y="82" class="small">前端交互、API 业务入口、Redis 异步判题、Worker 沙箱执行、数据库持久化、AI 安全辅助</text>

  <rect x="60" y="150" width="220" height="130" class="box soft"/>
  <text x="90" y="190" class="label">React UI</text>
  <text x="90" y="218" class="small">题库 / 工作台 / 管理后台</text>
  <text x="90" y="244" class="small">Monaco + TanStack Query</text>

  <rect x="410" y="125" width="260" height="175" class="box soft"/>
  <text x="445" y="168" class="label">FastAPI API</text>
  <text x="445" y="198" class="small">鉴权、路由、服务层</text>
  <text x="445" y="224" class="small">提交创建、题目查询</text>
  <text x="445" y="250" class="small">Redis status relay</text>

  <rect x="820" y="105" width="250" height="115" class="box data"/>
  <text x="850" y="148" class="label">PostgreSQL</text>
  <text x="850" y="178" class="small">用户、题目、用例</text>
  <text x="850" y="202" class="small">提交和判题结果</text>

  <rect x="820" y="270" width="250" height="135" class="box data"/>
  <text x="850" y="314" class="label">Redis</text>
  <text x="850" y="344" class="small">Streams: judge tasks</text>
  <text x="850" y="370" class="small">Pub/Sub: judge status</text>

  <rect x="410" y="430" width="260" height="135" class="box worker"/>
  <text x="445" y="474" class="label">Judge Worker</text>
  <text x="445" y="504" class="small">XREADGROUP 消费任务</text>
  <text x="445" y="530" class="small">调用 JudgeTask</text>

  <rect x="820" y="470" width="250" height="130" class="box worker"/>
  <text x="850" y="514" class="label">Docker Judge</text>
  <text x="850" y="544" class="small">禁网、限内存、非 root</text>
  <text x="850" y="570" class="small">运行多语言代码</text>

  <rect x="60" y="480" width="220" height="120" class="box ai"/>
  <text x="90" y="524" class="label">AI Provider</text>
  <text x="90" y="554" class="small">OpenAI-compatible</text>
  <text x="90" y="580" class="small">只接收安全上下文</text>

  <path class="arrow" d="M280 190 C330 180, 360 170, 410 170"/>
  <text x="303" y="156" class="small">REST API</text>
  <path class="arrow" d="M280 235 C330 250, 360 260, 410 255"/>
  <text x="300" y="284" class="small">WebSocket</text>

  <path class="arrow" d="M670 170 C720 158, 760 150, 820 150"/>
  <text x="704" y="136" class="small">SQLAlchemy</text>
  <path class="arrow" d="M670 260 C720 290, 760 315, 820 330"/>
  <text x="704" y="314" class="small">XADD / publish</text>

  <path class="arrow" d="M820 360 C760 390, 720 430, 670 478"/>
  <text x="705" y="430" class="small">XREADGROUP</text>
  <path class="arrow" d="M670 505 C725 515, 770 525, 820 535"/>
  <text x="708" y="548" class="small">Docker SDK</text>
  <path class="arrow" d="M820 565 C750 625, 520 630, 470 565"/>
  <text x="575" y="654" class="small">verdict / testcase results</text>
  <path class="muted" d="M410 520 C350 545, 300 555, 280 555"/>
  <text x="304" y="575" class="small">AI calls from API</text>
  <path class="arrow" d="M820 390 C650 410, 420 395, 250 280"/>
  <text x="500" y="410" class="small">status relay back to UI</text>
</svg>
