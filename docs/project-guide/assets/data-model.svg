<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">FastOJ data model</title>
  <desc id="desc">Core tables include User, Problem, TestCase, Submission, TestCaseResult, Solution, ProblemDraft, AgentRun, and AgentStep.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 10; }
      .core { fill: #eff6ff; stroke: #2563eb; }
      .result { fill: #f0fdf4; stroke: #16a34a; }
      .agent { fill: #faf5ff; stroke: #9333ea; }
      .title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .small { font: 13px Arial, "Microsoft YaHei", sans-serif; fill: #374151; }
      .line { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="700"/>
  <text x="50" y="54" class="title">核心数据模型</text>

  <rect x="70" y="115" width="210" height="120" class="box core"/>
  <text x="100" y="150" class="label">User</text>
  <text x="100" y="178" class="small">username / email</text>
  <text x="100" y="202" class="small">role / is_active</text>
  <text x="100" y="226" class="small">locale</text>

  <rect x="420" y="105" width="240" height="150" class="box core"/>
  <text x="450" y="140" class="label">Problem</text>
  <text x="450" y="168" class="small">slug / difficulty / tags</text>
  <text x="450" y="192" class="small">mode: acm/function/both</text>
  <text x="450" y="216" class="small">function_signature</text>
  <text x="450" y="240" class="small">is_public</text>

  <rect x="790" y="105" width="220" height="130" class="box result"/>
  <text x="820" y="140" class="label">TestCase</text>
  <text x="820" y="168" class="small">input / output</text>
  <text x="820" y="192" class="small">is_hidden / is_sample</text>
  <text x="820" y="216" class="small">score / order</text>

  <rect x="420" y="330" width="240" height="135" class="box result"/>
  <text x="450" y="366" class="label">Submission</text>
  <text x="450" y="394" class="small">user_id / problem_id</text>
  <text x="450" y="418" class="small">language / code</text>
  <text x="450" y="442" class="small">status / result</text>

  <rect x="790" y="330" width="220" height="135" class="box result"/>
  <text x="820" y="366" class="label">TestCaseResult</text>
  <text x="820" y="394" class="small">submission_id</text>
  <text x="820" y="418" class="small">status / resource usage</text>
  <text x="820" y="442" class="small">hidden content omitted</text>

  <rect x="70" y="330" width="210" height="120" class="box core"/>
  <text x="100" y="366" class="label">Solution</text>
  <text x="100" y="394" class="small">problem_id / language</text>
  <text x="100" y="418" class="small">official code</text>
  <text x="100" y="442" class="small">explanation / complexity</text>

  <rect x="70" y="540" width="230" height="105" class="box agent"/>
  <text x="100" y="576" class="label">ProblemDraft</text>
  <text x="100" y="604" class="small">draft fields as JSON</text>
  <text x="100" y="628" class="small">validation_report_json</text>

  <rect x="420" y="540" width="220" height="105" class="box agent"/>
  <text x="450" y="576" class="label">AgentRun</text>
  <text x="450" y="604" class="small">run_type / status</text>
  <text x="450" y="628" class="small">model_profile</text>

  <rect x="790" y="540" width="220" height="105" class="box agent"/>
  <text x="820" y="576" class="label">AgentStep</text>
  <text x="820" y="604" class="small">step_index / type</text>
  <text x="820" y="628" class="small">input/output summary</text>

  <path class="line" d="M280 170 H420"/>
  <text x="315" y="156" class="small">creates</text>
  <path class="line" d="M660 170 H790"/>
  <text x="690" y="156" class="small">has</text>
  <path class="line" d="M540 255 V330"/>
  <text x="552" y="296" class="small">receives</text>
  <path class="line" d="M280 390 H420"/>
  <text x="315" y="376" class="small">belongs to problem</text>
  <path class="line" d="M660 398 H790"/>
  <text x="690" y="384" class="small">records</text>
  <path class="line" d="M175 235 V330"/>
  <text x="188" y="292" class="small">submits</text>
  <path class="line" d="M300 592 H420"/>
  <text x="326" y="578" class="small">traced by</text>
  <path class="line" d="M640 592 H790"/>
  <text x="682" y="578" class="small">contains</text>
</svg>
