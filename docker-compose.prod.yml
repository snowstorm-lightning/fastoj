services:
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fastoj}
      POSTGRES_USER: ${POSTGRES_USER:-fastoj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fastoj}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastoj-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastoj-network

  api:
    image: ${FASTOJ_IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${FASTOJ_IMAGE_OWNER:?set FASTOJ_IMAGE_OWNER}/fastoj-api:${FASTOJ_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FASTOJ_BIND:-127.0.0.1}:${FASTOJ_PORT:-8010}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fastoj}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fastoj}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      DEBUG: ${FASTOJ_DEBUG:-false}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:8010"]}'
      JUDGE_ASYNC: "true"
      JUDGE_INLINE_FALLBACK: ${JUDGE_INLINE_FALLBACK:-false}
      JUDGE_CONTAINER_IMAGE: ${FASTOJ_IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${FASTOJ_IMAGE_OWNER:?set FASTOJ_IMAGE_OWNER}/fastoj-judge:${FASTOJ_JUDGE_IMAGE_TAG:-py311-node24-torch271}
      JUDGE_USE_DOCKER: "true"
      FASTOJ_ALLOW_UNSAFE_LOCAL_EXECUTION: "false"
      JUDGE_CHILD_PROCESS_ENABLED: ${JUDGE_CHILD_PROCESS_ENABLED:-true}
      JUDGE_TASK_HARD_TIMEOUT_SECONDS: ${JUDGE_TASK_HARD_TIMEOUT_SECONDS:-120}
      JUDGE_CHILD_TERMINATE_GRACE_SECONDS: ${JUDGE_CHILD_TERMINATE_GRACE_SECONDS:-3}
      JUDGE_ACTIVE_TASK_TTL_SECONDS: ${JUDGE_ACTIVE_TASK_TTL_SECONDS:-180}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:8080/v1}
      AI_API_KEY: ${AI_API_KEY:-sk-no-key-required}
      AI_MODEL: ${AI_MODEL:-qwen2.5-coder-7b-instruct-q4_k_m}
      AI_DEEPSEEK_BASE_URL: ${AI_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AI_DEEPSEEK_API_KEY: ${AI_DEEPSEEK_API_KEY:-}
      AI_DEEPSEEK_MODEL: ${AI_DEEPSEEK_MODEL:-deepseek-v4-flash}
      AI_DEEPSEEK_PRO_BASE_URL: ${AI_DEEPSEEK_PRO_BASE_URL:-https://api.deepseek.com}
      AI_DEEPSEEK_PRO_API_KEY: ${AI_DEEPSEEK_PRO_API_KEY:-}
      AI_DEEPSEEK_PRO_MODEL: ${AI_DEEPSEEK_PRO_MODEL:-deepseek-v4-pro}
      AI_DEEPSEEK_PRO_TIMEOUT_SECONDS: ${AI_DEEPSEEK_PRO_TIMEOUT_SECONDS:-180}
      AI_DEEPSEEK_PRO_MAX_OUTPUT_TOKENS: ${AI_DEEPSEEK_PRO_MAX_OUTPUT_TOKENS:-16000}
      AI_AUTHORING_REPAIR_ATTEMPTS: ${AI_AUTHORING_REPAIR_ATTEMPTS:-6}
      AI_QWEN_BASE_URL: ${AI_QWEN_BASE_URL:-http://host.docker.internal:8080/v1}
      AI_QWEN_API_KEY: ${AI_QWEN_API_KEY:-sk-no-key-required}
      AI_QWEN_MODEL: ${AI_QWEN_MODEL:-qwen2.5-coder-7b-instruct-q4_k_m}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge-runtime:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fastoj-network

  worker:
    image: ${FASTOJ_IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${FASTOJ_IMAGE_OWNER:?set FASTOJ_IMAGE_OWNER}/fastoj-worker:${FASTOJ_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fastoj}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fastoj}
      REDIS_URL: redis://redis:6379/0
      JUDGE_CONTAINER_IMAGE: ${FASTOJ_IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${FASTOJ_IMAGE_OWNER:?set FASTOJ_IMAGE_OWNER}/fastoj-judge:${FASTOJ_JUDGE_IMAGE_TAG:-py311-node24-torch271}
      JUDGE_USE_DOCKER: "true"
      FASTOJ_ALLOW_UNSAFE_LOCAL_EXECUTION: "false"
      JUDGE_CHILD_PROCESS_ENABLED: ${JUDGE_CHILD_PROCESS_ENABLED:-true}
      JUDGE_TASK_HARD_TIMEOUT_SECONDS: ${JUDGE_TASK_HARD_TIMEOUT_SECONDS:-120}
      JUDGE_CHILD_TERMINATE_GRACE_SECONDS: ${JUDGE_CHILD_TERMINATE_GRACE_SECONDS:-3}
      JUDGE_ACTIVE_TASK_TTL_SECONDS: ${JUDGE_ACTIVE_TASK_TTL_SECONDS:-180}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge-runtime:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import redis; from backend.core.config import settings; client = redis.from_url(settings.REDIS_URL); client.ping(); client.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fastoj-network

  judge-runtime:
    image: ${FASTOJ_IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${FASTOJ_IMAGE_OWNER:?set FASTOJ_IMAGE_OWNER}/fastoj-judge:${FASTOJ_JUDGE_IMAGE_TAG:-py311-node24-torch271}
    pull_policy: missing
    restart: unless-stopped
    command: ["sh", "-lc", "sleep infinity"]
    networks:
      - fastoj-network

networks:
  fastoj-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
