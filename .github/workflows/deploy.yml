name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      build_judge:
        description: Build and push the stable judge runtime image
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.TCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  JUDGE_IMAGE_TAG: ${{ vars.FASTOJ_JUDGE_IMAGE_TAG || 'py311-node24-torch271' }}
  DEPLOY_USER: ubuntu
  DEPLOY_PORT: ${{ secrets.TENCENT_PORT || '22' }}
  DEPLOY_PATH: ${{ vars.TENCENT_DEPLOY_PATH || '/opt/projects/fastoj' }}

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv==0.10.2

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Lint backend
        run: uv run ruff check .

      - name: Test backend
        run: uv run pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Test frontend
        run: npm test
        working-directory: frontend

  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: quality

    outputs:
      image_namespace: ${{ steps.image.outputs.namespace }}
      judge_built: ${{ steps.judge.outputs.build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image namespace
        id: image
        env:
          TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE }}
        run: |
          namespace="${TCR_NAMESPACE:-${GITHUB_REPOSITORY_OWNER}}"
          namespace="$(echo "${namespace}" | tr '[:upper:]' '[:lower:]')"
          echo "namespace=${namespace}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Decide whether to build judge image
        id: judge
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          REQUESTED_BUILD_JUDGE: ${{ inputs.build_judge || 'false' }}
        run: |
          image="${REGISTRY}/${{ steps.image.outputs.namespace }}/fastoj-judge:${JUDGE_IMAGE_TAG}"
          build_judge="false"

          if [ "${REQUESTED_BUILD_JUDGE}" = "true" ]; then
            build_judge="true"
          fi

          if ! docker buildx imagetools inspect "${image}" >/dev/null 2>&1; then
            build_judge="true"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ -z "${GITHUB_EVENT_BEFORE}" ] || [ "${GITHUB_EVENT_BEFORE}" = "0000000000000000000000000000000000000000" ]; then
              build_judge="true"
            elif git diff --name-only "${GITHUB_EVENT_BEFORE}" "${GITHUB_SHA}" -- Dockerfile.judge | grep -q .; then
              build_judge="true"
            fi
          fi

          echo "build=${build_judge}" >> "${GITHUB_OUTPUT}"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.namespace }}/fastoj-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.namespace }}/fastoj-api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.namespace }}/fastoj-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.namespace }}/fastoj-worker:latest

      - name: Build and push judge image
        if: steps.judge.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.judge
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.namespace }}/fastoj-judge:${{ env.JUDGE_IMAGE_TAG }}

  deploy:
    name: Deploy to Tencent Cloud
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_PRIVATE_KEY: ${{ secrets.TENCENT_SSH_PRIVATE_KEY }}
        run: |
          test -n "${TENCENT_HOST}"
          test -n "${TENCENT_SSH_PRIVATE_KEY}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${TENCENT_SSH_PRIVATE_KEY}" > ~/.ssh/tencent
          chmod 600 ~/.ssh/tencent
          ssh-keyscan -p "${DEPLOY_PORT}" "${TENCENT_HOST}" >> ~/.ssh/known_hosts

      - name: Upload production compose file
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
        run: |
          ssh -i ~/.ssh/tencent -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${TENCENT_HOST}" \
            "sudo mkdir -p '${DEPLOY_PATH}' && sudo chown '${DEPLOY_USER}:${DEPLOY_USER}' '${DEPLOY_PATH}'"
          scp -i ~/.ssh/tencent -P "${DEPLOY_PORT}" docker-compose.prod.yml \
            "${DEPLOY_USER}@${TENCENT_HOST}:${DEPLOY_PATH}/docker-compose.yml"

      - name: Log in to Tencent TCR on server
        env:
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
        run: |
          test -n "${TCR_USERNAME}"
          test -n "${TCR_PASSWORD}"
          printf '%s' "${TCR_PASSWORD}" | ssh -i ~/.ssh/tencent -p "${DEPLOY_PORT}" \
            "${DEPLOY_USER}@${TENCENT_HOST}" "docker login '${REGISTRY}' -u '${TCR_USERNAME}' --password-stdin"

      - name: Pull images and restart services
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          IMAGE_NAMESPACE: ${{ needs.build.outputs.image_namespace }}
          IMAGE_TAG: ${{ github.sha }}
          JUDGE_BUILT: ${{ needs.build.outputs.judge_built }}
        run: |
          ssh -i ~/.ssh/tencent -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${TENCENT_HOST}" "
            set -e
            cd '${DEPLOY_PATH}'
            test -f .env || { echo 'Missing ${DEPLOY_PATH}/.env on server' >&2; exit 1; }
            export FASTOJ_IMAGE_REGISTRY='${REGISTRY}'
            export FASTOJ_IMAGE_OWNER='${IMAGE_NAMESPACE}'
            export FASTOJ_IMAGE_TAG='${IMAGE_TAG}'
            export FASTOJ_JUDGE_IMAGE_TAG='${JUDGE_IMAGE_TAG}'
            judge_image=\"${REGISTRY}/${IMAGE_NAMESPACE}/fastoj-judge:${JUDGE_IMAGE_TAG}\"
            docker compose -f docker-compose.yml pull api worker
            if [ '${JUDGE_BUILT}' = 'true' ] || ! docker image inspect \"\${judge_image}\" >/dev/null 2>&1; then
              docker compose -f docker-compose.yml pull judge-runtime
              docker compose -f docker-compose.yml up -d --remove-orphans judge-runtime api worker
            else
              docker compose -f docker-compose.yml up -d --remove-orphans api worker
            fi
            docker image prune -f
            docker compose -f docker-compose.yml ps
          "
